<div class="container">
    <div class="barra-lateral">
        <app-sidebar></app-sidebar>
    </div>

    <div class="main-section">
        <app-header></app-header>

        <div class="contenido-principal">
            <div class="page-container">

                <div class="header-prestamos">
                    <div class="titulos-header">
                        <h2>Préstamos de Equipos</h2>
                        <p>Control de equipos prestados a docentes y personal.</p>
                    </div>
                    <button class="btn-nuevo-prestamo" (click)="toggleFormulario()">
                        <i class="fa fa-handshake-o"></i> Nuevo Préstamo
                    </button>
                </div>

                <div class="tabla-container">
                    <table class="tabla-moderna">
                        <thead>
                            <tr>
                                <th>ARTÍCULO</th>
                                <th>SOLICITANTE</th>
                                <th>FECHA PRÉSTAMO</th>
                                <th>FECHA DEVOLUCIÓN</th>
                                <th>ESTADO</th>
                                <th class="text-right">ACCIONES</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let p of prestamosFiltrados">
                                <td><strong>{{ p.articulo }}</strong></td>
                                <td>{{ p.solicitante }}</td>
                                <td>{{ p.fechaPrestamo }}</td>
                                <td>{{ p.fechaDevolucion }}</td>
                                <td>
                                    <span class="badge"
                                        [ngClass]="{'badge-activo': p.estado === 'ACTIVO', 'badge-devuelto': p.estado === 'DEVUELTO'}">
                                        {{ p.estado }}
                                    </span>
                                </td>
                                <td class="text-right">
                                    <button *ngIf="p.estado === 'ACTIVO'" class="btn-action-devuelto"
                                        (click)="marcarDevuelto(p.id)">
                                        Marcar Devuelto
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="empty-state" *ngIf="prestamosFiltrados.length === 0">
                        <p>No hay registros de préstamos.</p>
                    </div>
                </div>

                <div class="modal-overlay" *ngIf="mostrarFormulario">
                    <div class="modal-modern">
                        <div class="modal-header">
                            <h3>Registrar Nuevo Préstamo</h3>
                            <button class="btn-cerrar" (click)="toggleFormulario()">&times;</button>
                        </div>

                        <form (ngSubmit)="registrarPrestamo()" #f="ngForm" class="modal-body">
                            <div class="form-group">
                                <label>ARTÍCULO A PRESTAR</label>
                                <select [(ngModel)]="nuevoPrestamo.articulo" name="articulo" required>
                                    <option value="" disabled>Seleccione un equipo</option>
                                    <option *ngFor="let art of articulosDisponibles" [value]="art.nombre">{{ art.nombre
                                        }}</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>NOMBRE DEL SOLICITANTE</label>
                                <input type="text" [(ngModel)]="nuevoPrestamo.solicitante" name="solic"
                                    placeholder="ej. Prof. Carlos Ruiz" required>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label>FECHA PRÉSTAMO</label>
                                    <input type="date" [(ngModel)]="nuevoPrestamo.fechaPrestamo" name="fP" required>
                                </div>
                                <div class="form-group">
                                    <label>FECHA DEVOLUCIÓN</label>
                                    <input type="date" [(ngModel)]="nuevoPrestamo.fechaDevolucion" name="fD" required>
                                </div>
                            </div>

                            <div class="modal-footer-btns">
                                <button type="button" class="btn-cancelar"
                                    (click)="toggleFormulario()">Cancelar</button>
                                <button type="submit" class="btn-registrar" [disabled]="f.invalid">Registrar
                                    Préstamo</button>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>
