<div class="container">
  <div class="barra-lateral">
    <app-sidebar></app-sidebar>
  </div>

  <div class="main-section">
    <app-header></app-header>

    <div class="contenedor-reportes">
      <h2>📊 Módulo de Reportes del Inventario FISI - UNSM</h2>
      <p>
        Seleccione el tipo de reporte y los filtros correspondientes para
        visualizar o exportar los datos.
      </p>

      <!-- 🔹 Barra de filtros en una sola fila -->
      <div class="filtros-linea">
        <!-- Tipo de reporte -->
        <label for="tipoReporte">Tipo de Reporte:</label>
        <select id="tipoReporte" [(ngModel)]="tipoSeleccionado">
          <option value="">-- Seleccionar --</option>
          <option *ngFor="let t of tiposReportes" [value]="t.id">
            {{ t.nombre }}
          </option>
        </select>

        <!-- Filtros dinámicos en la misma línea -->
        <ng-container *ngIf="tipoSeleccionado === 'ubicacion'">
          <label>Ubicación:</label>
          <input
            type="text"
            [(ngModel)]="filtros.ubicacion"
            placeholder="Ej: Laboratorio de Redes"
          />
        </ng-container>

        <ng-container *ngIf="tipoSeleccionado === 'responsable'">
          <label>Responsable:</label>
          <input
            type="text"
            [(ngModel)]="filtros.responsable"
            placeholder="Ej: Ing. Pérez"
          />
        </ng-container>

        <ng-container *ngIf="tipoSeleccionado === 'movimientos'">
          <label>Fecha inicio:</label>
          <input type="date" [(ngModel)]="filtros.fechaInicio" />
          <label>Fecha fin:</label>
          <input type="date" [(ngModel)]="filtros.fechaFin" />
        </ng-container>

        <!-- Botones -->
        <button (click)="generarReporte()" class="btn-generar">
          Generar
        </button>
        <button (click)="limpiarFiltros()" class="btn-limpiar">Limpiar</button>
      </div>

      <!-- 🔹 Resultados -->
      <div class="resultados" *ngIf="resultados.length > 0">
        <h4>📋 Resultados del reporte</h4>

        <table>
          <thead>
            <tr>
              <th *ngFor="let col of objectKeys(resultados[0])">
                {{ col | titlecase }}
              </th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of resultados">
              <td *ngFor="let col of objectKeys(resultados[0])">
                {{ item[col] }}
              </td>
            </tr>
          </tbody>
        </table>

        <div class="botones-exportar">
          <button (click)="exportarPDF()">⬇ Exportar PDF</button>
          <button (click)="exportarExcel()">⬇ Exportar Excel</button>
          <button (click)="imprimirReporte()">🖨️ Imprimir</button>
        </div>
      </div>

      <div
        *ngIf="resultados.length === 0 && tipoSeleccionado"
        class="no-resultados"
      >
        <p>No hay datos para mostrar.</p>
      </div>
    </div>
  </div>
</div>
