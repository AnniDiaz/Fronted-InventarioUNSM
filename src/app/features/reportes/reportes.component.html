<div class="container">
  <div class="barra-lateral">
    <app-sidebar></app-sidebar>
  </div>

  <div class="main-section">
    <app-header></app-header>

    <div class="contenido-principal">

      <!-- TÍTULO -->
      <h2 class="titulo">Gestión de Reportes del Sistema</h2>

      <!-- FILA DE OPCIONES -->
      <div class="filtros">
        <select [(ngModel)]="reporteSeleccionado" class="select-reporte">
          <option value="" disabled selected>Seleccione un reporte</option>
          <option value="articulos-ubicacion">Artículos por Ubicación</option>
          <option value="articulos-tipo">Artículos por Tipo</option>
        </select>

        <button class="btn-generar" (click)="generarReporte()">
          <i class="fa fa-chart-bar"></i> Generar Reporte
        </button>

        <!-- Botón PDF arriba -->
        <button *ngIf="mostrarGrafico"
                class="btn-pdf"
                (click)="descargarPDF()">
          <i class="fa fa-file-pdf"></i> Descargar PDF
        </button>
      </div>

      <!-- CONTENIDO DEL REPORTE (sin scroll) -->
      <div class="reportes-contenido">

        <!-- GRÁFICO -->
        <div class="grafico-contenedor" *ngIf="mostrarGrafico">
          <canvas id="graficoReporte"></canvas>
        </div>

        <!-- TABLA -->
        <table class="tabla-reportes" *ngIf="mostrarTabla">
          <thead>
            <tr>
              <th>{{ columna1 }}</th>
              <th>{{ columna2 }}</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let item of tablaDatos">
              <td>{{ item.label }}</td>
              <td>{{ item.valor }}</td>
            </tr>
          </tbody>
        </table>
      </div>


  </div>
</div>
