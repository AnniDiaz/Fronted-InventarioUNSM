<div class="container">
  <div class="barra-lateral">
    <app-sidebar></app-sidebar>
  </div>

  <div class="main-section">
    <app-header></app-header>

    <div class="contenido-principal">
      <div class="card">
        <div class="cont-tit">
          <h2>Gestión de Módulos</h2>

          <div class="cont-btns">
            <button class="btn-agregar" (click)="toggleFormulario()">
              <i class="fa fa-plus"></i> Agregar Módulo
            </button>

            <div class="busqueda">
              <input type="text" placeholder="Buscar módulo..." [(ngModel)]="filtro" (input)="aplicarFiltro()">
              <button class="btn-buscar">
                <i class="fa fa-search"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- MODAL -->
        <div class="modal-overlay" *ngIf="mostrarFormulario">
          <div class="modal-content">
            <div class="modal-header">
              <h3>{{ editando ? 'Editar Módulo' : 'Registrar Nuevo Módulo' }}</h3>
              <button class="btn-cerrar" (click)="toggleFormulario()">&times;</button>
            </div>

            <div class="modal-body">
              <form (ngSubmit)="guardarModulo()" #moduloForm="ngForm">

                <div class="mb-3">
                  <label>Nombre</label>
                  <input type="text" [(ngModel)]="nuevoModulo.nombre" name="nombre" required>
                </div>

                <div class="mb-3">
                  <label>Ruta</label>
                  <input type="text" [(ngModel)]="nuevoModulo.ruta" name="ruta" required>
                </div>

                <div class="mb-3">
                  <label>Ícono (FontAwesome)</label>
                  <input type="text" [(ngModel)]="nuevoModulo.icon" name="icon">
                </div>

                <div class="acciones-form">
                  <button type="submit" class="btn-guardar" [disabled]="moduloForm.invalid">
                    {{ editando ? 'Actualizar' : 'Guardar' }}
                  </button>
                  <button type="button" class="btn-cancelar" (click)="toggleFormulario()">
                    Cancelar
                  </button>
                </div>

              </form>
            </div>
          </div>
        </div>

        <!-- TABLA -->
        <table class="tabla-modulos">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Submódulos</th>
              <th style="width:120px;">Acciones</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let modulo of modulosPaginados">
              <td>{{ modulo.nombre }}</td>
              

              <!-- SUBMÓDULOS -->
              <td>
                <ul>
                  <li *ngFor="let s of modulo.subModulos">
                    <i class="{{ s.icon }}"></i> {{ s.nombre }}
                  </li>
                </ul>
              </td>

              <td class="acciones">
                <button class="btn-editar" (click)="editarModulo(modulo)">
                  <i class="fa fa-edit"></i>
                </button>
                <button class="btn-eliminar" (click)="eliminarModulo(modulo.id)">
                  <i class="fa fa-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- PAGINACIÓN -->
        <div class="paginacion" *ngIf="totalPaginas > 1">
          <button (click)="cambiarPagina(paginaActual - 1)" [disabled]="paginaActual === 1">Anterior</button>
          <span>Página {{ paginaActual }} de {{ totalPaginas }}</span>
          <button (click)="cambiarPagina(paginaActual + 1)" [disabled]="paginaActual === totalPaginas">Siguiente</button>
        </div>

      </div>
    </div>
  </div>
</div>
