<div class="container">
  <div class="barra-lateral">
    <app-sidebar></app-sidebar>
  </div>

  <div class="main-section">
    <app-header></app-header>


    
    <div class="dashboard-container">

      <!-- 🔹 TARJETAS -->
      <div class="cards-row">
        <div class="card-stats">
          <h3>Computadoras</h3>
          <p class="number" id="totalComputadoras">0</p>
        </div>

        <div class="card-stats">
          <h3>Laptops</h3>
          <p class="number" id="totalLaptops">0</p>
        </div>

        <div class="card-stats">
          <h3>Mouses</h3>
          <p class="number" id="totalMouses">0</p>
        </div>
      </div>

      <!-- 🔹 FILA DE GRÁFICOS -->
      <div class="charts-row">
        <div class="chart-box">
          <h3>Artículos por ubicación</h3>
          <canvas id="barChart"></canvas>
        </div>

        <div class="chart-box">
          <h3>Distribución de Ubicaciones</h3>
          <canvas id="pieChart"></canvas>
        </div>
      </div>

      <!-- 🔹 EXTRA BONITO AL FINAL -->
      <div class="extra-box">
  <h3>Top 3 de ubicaciones con más artículos</h3>

  <div class="top-grid">
    <div class="top-item" *ngFor="let u of topUbicaciones">
      <div class="top-item-inner">
        <div class="top-title">{{ u.ubicacion }}</div>
        <div class="top-subtitle">{{ u.cantidad }} artículos</div>
      </div>
    </div>
  </div>
</div>


    </div>

  </div>
</div>
