<div class="container">
  <!-- Sidebar -->
  <div class="barra-lateral">
    <app-sidebar></app-sidebar>
  </div>

  <!-- Contenido principal -->
  <div class="main-section">
    <app-header></app-header>

    <div class="contenido-principal">
      <div class="card">

        <div class="cont-tit">
          <h2>Registro de Ubicaciones</h2>
          <div class="cont-btns">
            <button class="btn-agregar" (click)="toggleFormulario()">
              <i class="fa fa-plus"></i> Agregar Nuevo
            </button>

            <div class="busqueda">
              <input type="text" placeholder="Buscar ubicación..." [(ngModel)]="filtro" (input)="aplicarFiltro()">
              <button class="btn-buscar">
                <i class="fa fa-search"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="modal-backdrop" *ngIf="mostrarFormulario">
          <div class="modal-card">
            <div class="modal-header">
              <h3>{{ editando ? 'Editar Tipo de Ubicación' : 'Registrar Tipo de Ubicación' }}</h3>
              <button class="btn-cerrar" (click)="toggleFormulario()">&times;</button>
            </div>

            <div class="modal-body">
              <form (ngSubmit)="guardarUbicacion()" #tipoUbicacionForm="ngForm">
                <div class="mb-3">
                  <label>Nombre</label>
                  <input
                    type="text"
                    [(ngModel)]="nuevaUbicacion.nombre"
                    name="nombre"
                    required
                  />
                </div>

                <div class="acciones-form">
                  <button type="submit" class="btn-guardar" [disabled]="tipoUbicacionForm.invalid">
                    {{ editando ? 'Actualizar' : 'Guardar' }}
                  </button>
                  <button type="button" class="btn-cancelar" (click)="toggleFormulario()">
                    Cancelar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- 🟩 Cards -->
        <div class="grid-ubicaciones">
          <div class="ubicacion-card" *ngFor="let tipo of registrosPaginados; let i = index">
            <div class="card-header">
              <span class="card-num">{{ (paginaActual - 1) * registrosPorPagina + i + 1 }}</span>
              <h3>{{ tipo.nombre }}</h3>
            </div>

            <div class="acciones">
              <button class="btn-ver" (click)="verUbicaciones(tipo.id)">
                <i class="fa fa-eye"></i>
              </button>
              <button class="btn-editar" (click)="editarUbicacion(tipo)">
                <i class="fa fa-edit"></i>
              </button>
              <button class="btn-eliminar" (click)="eliminarUbicacion(tipo.id)">
                <i class="fa fa-trash"></i>
              </button>
            </div>
          </div>

          <!-- Sin resultados -->
          <div class="sin-resultados" *ngIf="registrosPaginados.length === 0">
            <p>No se encontraron tipos de ubicación.</p>
          </div>
        </div>

        <!-- 🩵 Paginación -->
        <div class="paginacion" *ngIf="totalPaginas > 1">
          <button (click)="cambiarPagina(paginaActual - 1)" [disabled]="paginaActual === 1">Anterior</button>
          <span>Página {{ paginaActual }} de {{ totalPaginas }}</span>
          <button (click)="cambiarPagina(paginaActual + 1)" [disabled]="paginaActual === totalPaginas">Siguiente</button>
        </div>

      </div>
    </div>
  </div>
</div>
