<div class="container">
  <div class="barra-lateral">
    <app-sidebar></app-sidebar>
  </div>

  <div class="main-section">
    <app-header></app-header>

    <div class="contenido-principal">
      <div class="card">

        <div class="cont-tit">
          <h2>Gestión de Usuarios</h2>

          <div class="cont-btns">
            <button class="btn-agregar" (click)="toggleFormulario()">
              <i class="fa fa-plus"></i> Agregar Usuario
            </button>

            <div class="busqueda">
              <input type="text" placeholder="Buscar usuario..." [(ngModel)]="filtro" (input)="aplicarFiltro()">
              <button class="btn-buscar">
                <i class="fa fa-search"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- MODAL -->
        <div class="modal-overlay" *ngIf="mostrarFormulario">
          <div class="modal-content">
            <div class="modal-header">
              <h3>{{ editando ? 'Editar Usuario' : 'Registrar Nuevo Usuario' }}</h3>
              <button class="btn-cerrar" (click)="toggleFormulario()">&times;</button>
            </div>

            <div class="modal-body">
              <form (ngSubmit)="guardarUsuario()" #usuarioForm="ngForm">

                <div class="mb-3">
                  <label>Nombres</label>
                  <input type="text" [(ngModel)]="nuevoUsuario.nombres" name="nombres" required>
                </div>

                <div class="mb-3">
                  <label>Apellidos</label>
                  <input type="text" [(ngModel)]="nuevoUsuario.apellidos" name="apellidos">
                </div>

                <div class="mb-3">
                  <label>Correo</label>
                  <input type="email" [(ngModel)]="nuevoUsuario.email" name="email" required>
                </div>

                <div class="mb-3">
                  <label>Username</label>
                  <input type="text" [(ngModel)]="nuevoUsuario.username" name="username" required>
                </div>

                <div class="mb-3" *ngIf="!editando">
                  <label>Password</label>
                  <input type="password" [(ngModel)]="nuevoUsuario.password" name="password" required>
                </div>

                <div class="mb-3">
                  <label>Rol</label>
                  <select [(ngModel)]="nuevoUsuario.rolId" name="rolId" required>
                    <option value="">Seleccione...</option>
                    <option *ngFor="let r of roles" [value]="r.id">{{ r.nombre }}</option>
                  </select>
                </div>

                <div class="acciones-form">
                  <button type="submit" class="btn-guardar" [disabled]="usuarioForm.invalid">
                    {{ editando ? 'Actualizar' : 'Guardar' }}
                  </button>

                  <button type="button" class="btn-cancelar" (click)="toggleFormulario()">
                    Cancelar
                  </button>
                </div>

              </form>
            </div>
          </div>
        </div>

        <!-- TABLA -->
        <table class="tabla-usuarios">
          <thead>
            <tr>
              <th>Nombres</th>
              <th>Username</th>
              <th>Correo</th>
              <th>Rol</th>
              <th style="width: 120px;">Acciones</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let u of usuariosPaginados">
              <td>{{ u.nombres }} {{ u.apellidos }}</td>
              <td>{{ u.username }}</td>
              <td>{{ u.correo }}</td>
              <td>{{ u.rolNombre }}</td>

              <td class="acciones">
                <button class="btn-editar" (click)="editarUsuario(u)">
                  <i class="fa fa-edit"></i>
                </button>

                <button class="btn-eliminar" (click)="eliminarUsuario(u.id)">
                  <i class="fa fa-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- PAGINACIÓN -->
        <div class="paginacion" *ngIf="totalPaginas > 1">
          <button (click)="cambiarPagina(paginaActual - 1)" [disabled]="paginaActual === 1">Anterior</button>
          <span>Página {{ paginaActual }} de {{ totalPaginas }}</span>
          <button (click)="cambiarPagina(paginaActual + 1)" [disabled]="paginaActual === totalPaginas">Siguiente</button>
        </div>

      </div> 
    </div>
  </div>
</div>
