<div class="container">
  <div class="barra-lateral">
    <app-sidebar></app-sidebar>
  </div>

  <div class="main-section">
    <app-header></app-header>

    <div class="contenido-principal">
      <div class="card">
        <div class="cont-tit">
          <h2>Gestión de Permisos</h2>
          <div class="cont-btns">
            <button class="btn-agregar" (click)="toggleFormulario()">
              <i class="fa fa-plus"></i> Agregar Permiso
            </button>

            <div class="busqueda">
              <input type="text" placeholder="Buscar permiso..." [(ngModel)]="filtro" (input)="aplicarFiltro()">
              <button class="btn-buscar">
                <i class="fa fa-search"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- MODAL -->
        <div class="modal-overlay" *ngIf="mostrarFormulario">
          <div class="modal-content">
            <div class="modal-header">
              <h3>{{ editando ? 'Editar Permiso' : 'Registrar Nuevo Permiso' }}</h3>
              <button class="btn-cerrar" (click)="toggleFormulario()">&times;</button>
            </div>

            <div class="modal-body">
              <form (ngSubmit)="guardarPermiso()" #permisoForm="ngForm">
                <div class="mb-3">
                  <label>Nombre</label>
                  <input type="text" [(ngModel)]="nuevoPermiso.nombre" name="nombre" required>
                </div>
                <div class="mb-3">
                  <label>Activo</label>
                  <select [(ngModel)]="nuevoPermiso.activo" name="activo" required>
                    <option [value]="true">Sí</option>
                    <option [value]="false">No</option>
                  </select>
                </div>

                <div class="acciones-form">
                  <button type="submit" class="btn-guardar" [disabled]="permisoForm.invalid">
                    {{ editando ? 'Actualizar' : 'Guardar' }}
                  </button>
                  <button type="button" class="btn-cancelar" (click)="toggleFormulario()">
                    Cancelar
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>

        <!-- TABLA -->
        <table class="tabla-permisos">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Activo</th>
              <th style="width: 120px;">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let permiso of permisosPaginados">
              <td>{{ permiso.nombre }}</td>
              <td>{{ permiso.activo ? 'Sí' : 'No' }}</td>
              <td class="acciones">
                <button class="btn-editar" (click)="editarPermiso(permiso)">
                  <i class="fa fa-edit"></i>
                </button>
                <button class="btn-eliminar" (click)="eliminarPermiso(permiso.id)">
                  <i class="fa fa-trash"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- PAGINACIÓN -->
        <div class="paginacion" *ngIf="totalPaginas > 1">
          <button (click)="cambiarPagina(paginaActual - 1)" [disabled]="paginaActual === 1">Anterior</button>
          <span>Página {{ paginaActual }} de {{ totalPaginas }}</span>
          <button (click)="cambiarPagina(paginaActual + 1)" [disabled]="paginaActual === totalPaginas">Siguiente</button>
        </div>

      </div>
    </div>
  </div>
</div>
